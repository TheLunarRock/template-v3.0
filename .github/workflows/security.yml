name: Security

# 個人開発前提のため main push 時のみ実行（v3.7.8〜）
# 週次cron は不要（Dependabot alerts で重大脆弱性は通知される）
on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: 依存パッケージ脆弱性監査（pnpm audit）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: 本番依存の脆弱性監査（high以上でブロック）
        run: pnpm audit --prod --audit-level=high

      - name: 全依存の脆弱性監査（moderate以上・警告のみ）
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  gitleaks:
    name: シークレットスキャン（gitleaks・二重防御）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks実行
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: 静的解析（CodeQL SAST）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL初期化
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: CodeQL解析
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
