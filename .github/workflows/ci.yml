name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: コード品質チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: 型チェック
        run: pnpm typecheck

      - name: フィーチャー境界チェック
        run: pnpm check:boundaries

      - name: 全体チェック
        run: |
          cp .env.ci .env.local 2>/dev/null || true
          pnpm check

  test:
    name: テスト実行
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: 単体テスト + カバレッジ計測
        run: pnpm test:coverage

      - name: カバレッジレポートをアーティファクト化
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: ビルドチェック
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: プロダクションビルド
        run: pnpm build

      - name: Preflightチェック
        run: pnpm preflight
